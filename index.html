    const grad = ctx.createLinearGradient(0, 0, 0, height);
    grad.addColorStop(0, colors.card);
    grad.addColorStop(1, darkMode ? '#0f1629' : '#ffffff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    // Grid
    ctx.strokeStyle = colors.border + '20';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < width; i += 20) {
      ctx.beginPath();
      ctx.moveTo(i, 0);
      ctx.lineTo(i, height);
      ctx.stroke();
    }

    // Face drawing with parameters
    const centerX = width / 2;
    const centerY = height / 2;
    const scale = 60 + parameters.jawline / 20;

    // Main face outline - ellipse with modifications
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(
      centerX,
      centerY,
      scale + parameters.noseWidth / 20,
      scale + parameters.jawline / 15,
      0,
      0,
      Math.PI * 2
    );
    ctx.stroke();

    // Forehead
    ctx.beginPath();
    ctx.moveTo(centerX - 50, centerY - 60);
    ctx.lineTo(centerX - 50, centerY - 60 + parameters.foreheadAugmentation / 30);
    ctx.lineTo(centerX + 50, centerY - 60 + parameters.foreheadAugmentation / 30);
    ctx.lineTo(centerX + 50, centerY - 60);
    ctx.stroke();

    // Nose detailed
    ctx.strokeStyle = colors.accent4;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - 25);
    ctx.quadraticCurveTo(centerX + 5 + parameters.noseBridge / 20, centerY + 5, centerX + 7 + parameters.noseBridge / 20, centerY + 20);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - 25);
    ctx.quadraticCurveTo(centerX - 5 + parameters.noseBridge / 20, centerY + 5, centerX - 7 + parameters.noseBridge / 20, centerY + 20);
    ctx.stroke();

    // Nose tip
    ctx.beginPath();
    ctx.arc(centerX + parameters.noseTip / 40, centerY + 20, 3, 0, Math.PI * 2);
    ctx.stroke();

    // Lips
    ctx.strokeStyle = colors.accent2;
    ctx.lineWidth = 3 + parameters.lipsVolume / 30;
    ctx.beginPath();
    ctx.quadraticCurveTo(centerX, centerY + 35 + parameters.lipsVolume / 20, centerX + 22, centerY + 45);
    ctx.stroke();
    ctx.beginPath();
    ctx.quadraticCurveTo(centerX, centerY + 35 + parameters.lipsVolume / 20, centerX - 22, centerY + 45);
    ctx.stroke();

    // Chin
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(centerX, centerY + 65 + parameters.chinAugmentation / 25, 8 + parameters.jawline / 40, 0, Math.PI, false);
    ctx.stroke();

    // Cheekbones
    ctx.strokeStyle = colors.accent1;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(centerX - 30, centerY - 5, 10 + parameters.cheekbones / 25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(centerX + 30, centerY - 5, 10 + parameters.cheekbones / 25, 0, Math.PI * 2);
    ctx.stroke();

    // Eyes
    ctx.fillStyle = colors.accent1;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(centerX - 18, centerY - 20 + parameters.eyeShape / 35, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(centerX + 18, centerY - 20 + parameters.eyeShape / 35, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Eyebrows
    ctx.strokeStyle = colors.border;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(centerX - 18, centerY - 35 + parameters.browPosition / 25, 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(centerX + 18, centerY - 35 + parameters.browPosition / 25, 2, 0, Math.PI * 2);
    ctx.stroke();

    // Symmetry line
    ctx.strokeStyle = colors.accent3;
    ctx.setLineDash([5, 5]);
    ctx.globalAlpha = 0.4 + parameters.asymmetryCorrection / 300;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY - 70);
    ctx.lineTo(centerX, centerY + 70);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    // Skin quality indicator
    ctx.strokeStyle = colors.accent3 + (Math.max(0, parameters.skinTightness) > 0 ? 'ff' : '40');

    ctx.globalAlpha = 0.6;

      scale + parameters.jawline / 15 - 8,
