version: '3.8'

services:
  # Frontend - React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: surgipredict-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REACT_APP_API_URL=http://backend:5000
      - REACT_APP_ENV=production
    depends_on:
      - backend
    networks:
      - surgipredict-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - Node.js API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: surgipredict-backend
    ports:
      - "5000:5000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/surgipredict
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - surgipredict-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: surgipredict-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=surgipredict
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - surgipredict-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional - para mejorar performance)
  redis:
    image: redis:7-alpine
    container_name: surgipredict-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - surgipredict-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Adminer (Database UI - Optional)
  adminer:
    image: adminer
    container_name: surgipredict-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - surgipredict-network
    restart: unless-stopped
    environment:
      - ADMINER_DEFAULT_SERVER=postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  surgipredict-network:
    driver: bridge

# ============================================================================
# INSTRUCCIONES DE USO:
# ============================================================================
# 
# 1. Crear archivo .env en raiz del proyecto con:
#    ANTHROPIC_API_KEY=sk-ant-xxxxx
#
# 2. Construir y ejecutar:
#    docker-compose up --build
#
# 3. Acceder a:
#    Frontend: http://localhost:3000
#    Backend API: http://localhost:5000
#    Database Admin: http://localhost:8080
#
# 4. Ver logs:
#    docker-compose logs -f frontend
#    docker-compose logs -f backend
#    docker-compose logs -f postgres
#
# 5. Detener todo:
#    docker-compose down
#
# 6. Limpiar todo (volúmenes, redes):
#    docker-compose down -v
#
# ============================================================================
